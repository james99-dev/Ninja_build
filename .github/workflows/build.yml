name: Build OpenWrt MT6000
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  REMOTE_REPOSITORY: pesa1234/openwrt
  CONFIG_FILE: mt6000.config  # Assure-toi que c'est le nom de ton fichier sur GitHub
  GH_TOKEN: ${{ github.token }}
jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 350
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget llvm
          
      - name: Get Remote Branch Name
        id: get_branch
        run: |
          remote_branch=$(git ls-remote https://github.com/${{ env.REMOTE_REPOSITORY }}.git "refs/heads/next-*" | sed -e 's|\(.*heads/\)||' | grep -viE 'test|beta' | sort -V | tail -n1)
          echo "branch=${remote_branch}" >> $GITHUB_OUTPUT
          
      - name: Checkout remote repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ steps.get_branch.outputs.branch }}
          
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: "builder_repo"
          
      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Setup configuration
        run: |
          # On copie ton .config dans la racine du build
          cp builder_repo/${{ env.CONFIG_FILE }} .config
          # On copie ton dossier files s'il existe
          [ -d builder_repo/files ] && cp -r builder_repo/files files
          make defconfig

      - name: Download packages
        run: |
          make download -j8
          find dl -size -1k -exec ls -l {} \;
          find dl -size -1k -exec rm -f {} \;

      - name: Compile the firmware
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Flint2_Firmware
          path: bin/targets/mediatek/**/*.bin  # Le '**' permet de chercher dans tous les sous-dossiers
          if-no-files-found: error # Si ça échoue encore, on veut savoir pourquoi !
