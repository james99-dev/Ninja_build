name: Build OpenWrt MT6000
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
  push:
    tags:         # Ajouté : Se déclenche quand tu crées un tag (ex: v1.0.1)
      - 'v*'

env:
  REMOTE_REPOSITORY: pesa1234/openwrt
  CONFIG_FILE: seed.config
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 350
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget llvm
          
      - name: Get Remote Branch Name
        id: get_branch
        run: |
          remote_branch=$(git ls-remote https://github.com/${{ env.REMOTE_REPOSITORY }}.git "refs/heads/next-*" | sed -e 's|\(.*heads/\)||' | grep -viE 'test|beta' | sort -V | tail -n1)
          echo "branch=${remote_branch}" >> $GITHUB_OUTPUT
          
      - name: Checkout remote repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ steps.get_branch.outputs.branch }}
          
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: "builder_repo"
          
      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Setup configuration
        run: |
          cp builder_repo/${{ env.CONFIG_FILE }} .config
          # Ton dossier "files" avec tes scripts est copié ici
          [ -d builder_repo/files ] && cp -r builder_repo/files files || true
          [ -f builder_repo/attendedsysupgrade-with-GitHub.patch ] && patch -p1 < builder_repo/attendedsysupgrade-with-GitHub.patch || true
          rm -rf builder_repo
          make defconfig
          
      - name: Download packages
        run: |
          make download -j$(nproc)
          find dl -size -1k -exec ls -l {} \;
          find dl -size -1k -exec rm -f {} \;
          
      - name: Compile the firmware
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          
      - name: Prepare Artifacts
        run: |
          mkdir -p firmware
          echo "=== Searching for firmware files ==="
          find ./bin -name '*sysupgrade.bin' -type f
          echo "=== Copying files ==="
          find ./bin -name '*sysupgrade.bin' -exec cp -v {} ./firmware/ \;
          find ./bin -name 'config.buildinfo' -exec cp -v {} ./firmware/ \; || true
          find ./bin -name 'version.buildinfo' -exec cp -v {} ./firmware/ \; || true
          cp .config firmware/full.config || true
          echo "=== Files in firmware/ ==="
          ls -lah ./firmware/
          cd firmware && sha256sum *.bin > sha256sums || true
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gl-mt6000-firmware
          path: firmware/*

      # --- SECTION AJOUTÉE : CRÉATION DE LA RELEASE GITHUB ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            firmware/*.bin
            firmware/sha256sums
            firmware/version.buildinfo
          tag_name: ${{ github.ref_name }}
          name: Ninja Build ${{ github.ref_name }}
          body: |
            Mise à jour automatique pour Flint 2 (MT6000) ⛳️
            Build généré le : ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
